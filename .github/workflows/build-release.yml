name: Auto Release

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: tool
          release_name: Auto build - Junk Code + PyArmor + Nuitka
          draft: false
          prerelease: false
